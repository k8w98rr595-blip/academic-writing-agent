services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: paperlight
      POSTGRES_USER: paperlight
      POSTGRES_PASSWORD: paperlight-local-only
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperlight"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: paperlight-local
      MINIO_ROOT_PASSWORD: paperlight-local-password
    volumes:
      - minio-data:/data

  api:
    build: .
    env_file: .env.local
    environment:
      DATABASE_URL: postgresql+psycopg://paperlight:paperlight-local-only@postgres:5432/paperlight
      REDIS_URL: redis://redis:6379/0
      JOB_MODE: celery
      OBJECT_STORAGE_MODE: minio
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY_ID: paperlight-local
      S3_SECRET_ACCESS_KEY: paperlight-local-password
      S3_BUCKET: paperlight
      HOST: 0.0.0.0
    ports:
      - "8000:8000"
    volumes:
      - api-data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio-init:
        condition: service_completed_successfully

  worker:
    build: .
    command: ["celery", "-A", "services.worker.celery_app.celery", "worker", "--beat", "--loglevel=INFO"]
    env_file: .env.local
    environment:
      DATABASE_URL: postgresql+psycopg://paperlight:paperlight-local-only@postgres:5432/paperlight
      REDIS_URL: redis://redis:6379/0
      JOB_MODE: celery
      OBJECT_STORAGE_MODE: minio
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY_ID: paperlight-local
      S3_SECRET_ACCESS_KEY: paperlight-local-password
      S3_BUCKET: paperlight
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio-init:
        condition: service_completed_successfully

  minio-init:
    image: minio/mc:latest
    entrypoint: ["/bin/sh", "-c"]
    command: ["until mc alias set local http://minio:9000 paperlight-local paperlight-local-password; do sleep 1; done; mc mb --ignore-existing local/paperlight"]
    depends_on:
      minio:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
  minio-data:
  api-data:
