name: Test and deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          package-manager-cache: false
      - name: Enable pinned pnpm
        run: corepack enable && corepack prepare pnpm@11.7.0 --activate
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/api/requirements-dev.txt
      - run: pnpm install --frozen-lockfile
      - run: python -m pip install -r services/api/requirements-dev.txt
      - run: python -m pytest tests -q
      - run: pnpm test
      - run: pnpm typecheck
      - run: pnpm build
        env:
          NEXT_PUBLIC_BASE_PATH: /academic-writing-agent
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.PAPERLIGHT_API_BASE_URL || 'https://paperlight-backend.invalid' }}
      - run: pnpm check:secrets
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: apps/web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
